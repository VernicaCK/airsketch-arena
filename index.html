<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AirSketch Arena - Milestone 2</title>
  <link rel="stylesheet" href="style.css" />

  <!-- MediaPipe Hands: detects hand landmarks from video frames -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <!-- MediaPipe Camera Utils: helper for feeding webcam frames into MediaPipe -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <!-- MediaPipe Drawing Utils: helper for drawing landmarks/connections -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
</head>
<body>
  <header>
    <h1>AirSketch Arena</h1>
    <p class="subtitle">Resizable Eraser (Locked Sizing)</p>
  </header>

  <main>
    <!-- This box holds the video, the landmark canvas, and any error message -->
    <div class="video-container">
      <video id="webcam" autoplay playsinline></video>

      <!-- This canvas sits exactly on top of the video.
           We draw the 21 hand landmarks + connections on it. -->
      <canvas id="overlay"></canvas>

      <!-- This canvas sits ABOVE the drawing canvas and is cleared every
           frame. It only shows temporary cursor info (like the eraser's
           circular outline) - it never holds permanent drawing. -->
      <canvas id="cursor-overlay"></canvas>

      <!-- Hidden by default, shown only if camera access fails -->
      <p id="error-message" class="error-message hidden">
        ⚠️ Camera access was denied or is unavailable. Please allow camera
        permission and refresh the page.
      </p>

      <!-- Floating brush toolbar: color swatches, eraser, and clear button -->
      <div class="toolbar">
        <button class="color-swatch active" data-color="#2cb67d" style="background:#2cb67d" title="Green"></button>
        <button class="color-swatch" data-color="#7f5af0" style="background:#7f5af0" title="Purple"></button>
        <button class="color-swatch" data-color="#ff6b6b" style="background:#ff6b6b" title="Red"></button>
        <button class="color-swatch" data-color="#ffd166" style="background:#ffd166" title="Yellow"></button>
        <button class="color-swatch" data-color="#4ea8de" style="background:#4ea8de" title="Blue"></button>

        <span class="toolbar-divider"></span>

        <button id="eraser-btn" class="tool-btn" title="Eraser">🧹</button>
        <button id="clear-btn" class="tool-btn" title="Clear Canvas">🗑️</button>
      </div>
    </div>
  </main>

  <!-- Our JavaScript logic lives in a separate file -->
  <script src="script.js"></script>
</body>
</html>
